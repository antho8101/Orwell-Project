<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Orwell Project banner">
  <defs>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#0C2348" opacity="0.08"/>
      <circle cx="40" cy="28" r="1" fill="#0C2348" opacity="0.06"/>
      <circle cx="78" cy="64" r="1" fill="#0C2348" opacity="0.07"/>
      <circle cx="110" cy="18" r="1" fill="#0C2348" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EBE1C4"/>
      <stop offset="55%" stop-color="#E6D7A8"/>
      <stop offset="100%" stop-color="#D2BF86"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grain)"/>
  <rect y="0" width="1280" height="88" fill="#0C2348"/>
  <circle cx="72" cy="44" r="26" fill="none" stroke="#E6D7A8" stroke-width="3"/>
  <ellipse cx="72" cy="44" rx="14" ry="9" fill="none" stroke="#E6D7A8" stroke-width="3"/>
  <circle cx="72" cy="44" r="4" fill="#E6D7A8"/>
  <text x="110" y="54" fill="#E6D7A8" font-family="Arial Narrow, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4">ORWELL PROJECT</text>
  <text x="72" y="250" fill="#0C2348" font-family="Arial Narrow, Impact, sans-serif" font-size="86" font-weight="700" letter-spacing="2">FREEDOM IS NOT OPTIONAL</text>
  <text x="72" y="320" fill="#101820" font-family="Arial Narrow, Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="2">TAKE BACK WHAT THEY STOLE.</text>
  <text x="72" y="390" fill="#143466" font-family="Georgia, serif" font-size="24">No servers. No masters. No chains.</text>
  <rect x="72" y="430" width="320" height="64" fill="#0C2348"/>
  <text x="232" y="472" fill="#E6D7A8" font-family="Arial Narrow, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3" text-anchor="middle">JOIN THE RESISTANCE</text>
  <rect x="880" y="160" width="320" height="320" fill="#0C2348"/>
  <circle cx="1040" cy="300" r="90" fill="none" stroke="#E6D7A8" stroke-width="6"/>
  <ellipse cx="1040" cy="300" rx="52" ry="32" fill="none" stroke="#E6D7A8" stroke-width="6"/>
  <circle cx="1040" cy="300" r="16" fill="#E6D7A8"/>
  <text x="1040" y="520" fill="#0C2348" font-family="Arial Narrow, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="2" text-anchor="middle">WE ARE WATCHING BACK</text>
</svg>
